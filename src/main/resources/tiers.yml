# Global rarity tiers.
# Tiers define shared display, base spawn weights, scaling, and effects.

# The key under tiers is the internal tier id used by mob variants.
# Higher weights are more common when the plugin rolls a rarity.
# MiniMessage is supported in display text.
# Placeholder values such as %mobrarity_level% are replaced before MiniMessage rendering.
# Available placeholders include %mobrarity_tier%, %mobrarity_tier_key%,
# %mobrarity_variant%, %mobrarity_variant_key%, %mobrarity_level%,
# and %mobrarity_entity%.
# Tier trigger actions are inherited by variants using that tier.
# Per-mob variant triggers in mobs.yml can add more actions for specific mobs.
# chance is 0.0 to 1.0, where 1.0 always runs after the trigger fires.
# rarity-weight-modifier.per-level increases this tier's spawn chance as mob level rises.
# display.nametag is a default nametag template for variants that do not override it.
# stats can modify max-health, attack-damage, movement-speed, armor,
# armor-toughness, knockback-resistance, and follow-range.
# Stat modifiers support add, multiply, and per-level. Tier and variant stats stack.
# Keep particle intervals reasonable; very low values can affect server performance.
# Supported trigger names include on_spawn, on_death, on_damage, on_shear,
# on_tame, on_breed, on_interact, and on_aura_tick.
# Per-mob variants in mobs.yml can override or extend these defaults.
tiers:
  common:
    weight: 100
    display-name: "<gray>Common</gray>"
  rare:
    weight: 8
    display-name: "<aqua>Rare</aqua>"
    rarity-weight-modifier:
      per-level: 0.03
    stats:
      max-health:
        add: 4.0
        per-level: 0.25
      attack-damage:
        multiply: 1.15
    display:
      nametag: "<aqua>[Lv %mobrarity_level%] %mobrarity_variant%</aqua>"
    visuals:
      particles:
        enabled: true
        particle: HAPPY_VILLAGER
        interval-ticks: 40
        count: 3
    triggers:
      on_death:
        chance: 1.0
        actions:
          - type: currency_drop
            amount: 5.0
          - type: console_command
            command: "say %player% defeated a rare %entity_type%"

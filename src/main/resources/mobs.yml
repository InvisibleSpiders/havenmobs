# Per-mob rarity settings.
# Entity keys use Bukkit EntityType names such as ZOMBIE, SHEEP, CREEPER, or SKELETON.

# Spawn sources let you decide where rarity mobs can come from.
# NATURAL covers ordinary world spawning.
# SPAWNER covers mob spawner blocks.
# SPAWN_EGG covers player-used spawn eggs.
# BREEDING covers child mobs created through breeding.
# COMMAND covers this plugin's admin spawn command.
# PLUGIN covers other plugin-created entities when Paper reports plugin spawning.
# Variants are named special mobs tied to a global tier.
# A variant key should not contain "|"; the plugin uses that internally for mob data.
# variant.weight controls how often that variant is picked for this mob type.
# variant.tier must match a key from tiers.yml.
# variant.stats can add to tier stats for this specific mob variant.
# display.nametag overrides the tier nametag for this specific variant.
# Nametags can use %mobrarity_tier%, %mobrarity_variant%, %mobrarity_level%,
# %mobrarity_entity%, and their *_key variants.
# Triggers define when configured actions run.
# Trigger chance is checked before its actions run; omit chance for 1.0.
# on_aura_tick uses interval-ticks and radius to run effects near the mob.
# Supported actions in this chunk:
# - item_drop: material + amount, where amount can be a number or "min-max".
# - potion_effect: effect + duration-ticks + amplifier, target defaults to the player.
# - currency_drop: amount deposited through VaultUnlocked/Vault economy when available.
# - loot_table: table + optional rolls; drops items from a vanilla/datapack loot table.
# - console_command or player_command: command text with placeholders.
# - xp_drop: amount of experience to drop at the mob.
# - heal or damage: amount, target defaults to player and can be mob.
# - knockback: strength, optional y, target defaults to player and can be mob.
# - lightning_effect: visual lightning at the mob without lightning damage.
# - hostile_target: makes a Mob target the triggering player when the entity supports targeting.
# Any action can set claim-action to choose the LandClaims flag checked before it runs.
# By default, hostile_target checks mob_griefing and other actions check their action type.
# When a trigger came from natural damage without a player source, player-only actions may skip safely.
mobs:
  SHEEP:
    spawn-sources:
      NATURAL: true
      SPAWNER: false
      SPAWN_EGG: true
      BREEDING: true
      COMMAND: true
      PLUGIN: true
    variants:
      toxic_sheep:
        tier: rare
        weight: 2
        stats:
          movement-speed:
            multiply: 1.1
        display:
          nametag: "<green>[Lv %mobrarity_level%] Toxic Sheep</green>"
        triggers:
          on_aura_tick:
            interval-ticks: 40
            radius: 4.0
            actions:
              - type: potion_effect
                effect: POISON
                duration-ticks: 80
                amplifier: 0
          on_damage:
            chance: 1.0
            actions:
              - type: hostile_target
                claim-action: mob_griefing
              - type: potion_effect
                effect: POISON
                duration-ticks: 60
                amplifier: 0
      rare_sheep:
        tier: rare
        weight: 3
        stats:
          knockback-resistance:
            add: 0.1
        display:
          nametag: "<aqua>[Lv %mobrarity_level%] Rare Sheep</aqua>"
        triggers:
          on_shear:
            chance: 0.25
            actions:
              - type: item_drop
                material: DIAMOND
                amount: 1
              - type: item_drop
                material: GOLD_NUGGET
                amount: "2-8"
              - type: loot_table
                table: minecraft:entities/sheep
                rolls: 1
